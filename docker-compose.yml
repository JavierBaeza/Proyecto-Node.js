# Define dos servicios:
#   · db -> contenedor de PostgreSQL con la BD inicializada automáticamente
#   · app -> contenedor de la API Node.js que depende de db

services:
  # Servicio: PostgreSQL

  db:
    image: postgres:16-alpine # Imagen oficial de PostgreSQL, versión LTS
    container_name: cs2_wiki_db
    restart: unless-stopped # Se reinicia automáticamente salvo que lo detengamos a mano
    environment:
      POSTGRES_DB: ${PGDATABASE} # Nombre de la BD, tomado del .env
      POSTGRES_USER: ${PGUSER} # Usuario, tomado del .env
      POSTGRES_PASSWORD: ${PGPASSWORD} # Contraseña, tomada del .env
    ports:
      - "${EXTERNAL_DB_PORT}:5432" # Expone el puerto para conectarse desde pgAdmin local
    volumes:
      # Persistencia de datos: aunque el contenedor se detenga, los datos sobreviven
      - postgres_data:/var/lib/postgresql/data
      # Script de inicialización: se ejecuta automáticamente la primera vez
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PGUSER} -d ${PGDATABASE}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Servicio: API Node.js

  app:
    build: . # Construye la imagen desde el Dockerfile en la raíz
    container_name: cs2_wiki_app
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}" # La API estará en http://localhost:3000
    env_file: 
      - .env # Carga las variables de entorno desde el archivo .env
     
    depends_on:
      db:
        condition: service_healthy # Espera a que PostgreSQL esté listo antes de iniciar la app

  # Servicio: Frontend React/Vite (Nginx)
  frontend:
    build:
      context: ./frontend
    container_name: cs2_wiki_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80" # Expone el frontend en el puerto configurado en el .env
    depends_on:
      - app

# Volumen nombrado para persistir los datos de PostgreSQL
volumes:
  postgres_data:
